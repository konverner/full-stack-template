repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0 # Updated to latest
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
        exclude: &exclude_pattern |
            (?x)^(
                frontend/src/client/.*
            )$
      - id: trailing-whitespace
        exclude: *exclude_pattern

  # BACKEND: Unified Linting/Formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # BACKEND: Type Checking (More robust system call)
  - repo: local
    hooks:
      - id: mypy
        name: backend-type-check
        entry: bash -c "cd backend && python -m mypy ."
        language: system
        types: [python]
        pass_filenames: false

  # FRONTEND: Prettier (Exclude generated client)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, html, markdown]
        files: ^frontend/
        exclude: *exclude_pattern

  # FRONTEND: Type Checking
  - repo: local
    hooks:
      - id: tsc-frontend
        name: frontend-type-check
        # Using npx directly is safer than assuming a script exists in package.json
        entry: bash -c "cd frontend && npx tsc --noEmit"
        language: system
        files: ^frontend/src/
        pass_filenames: false
